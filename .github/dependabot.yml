version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patches-and-minor:
        update-types: ['patch', 'minor']
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      # Tailwind v4 = breaking config + utilities. Migration planifiée Phase 1+.
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      # ESLint v9 casse le shim eslint-plugin-local (cf. dette #13).
      # À coordonner avec la migration flat config en Phase 1.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: '/worker'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      patches-and-minor:
        update-types: ['patch', 'minor']
    ignore:
      # TS v6 à coordonner avec un bump root (Phase 1+).
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
