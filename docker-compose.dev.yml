# Dev compose override — Phase 1D
# Étend docker-compose.yml en exposant les ports pg/redis/mailpit sur le host
# avec un décalage Phase 1D pour cohabiter avec un éventuel stack phase-1c
# (5433/6380/1025/8025) toujours actif.
#
# Usage : `docker compose -p phase-1d -f docker-compose.dev.yml --profile dev up -d pg redis mailpit`

include:
  - path: docker-compose.yml

services:
  pg:
    ports:
      - '127.0.0.1:5434:5432'

  redis:
    ports:
      - '127.0.0.1:6381:6379'

  mailpit:
    # !override to replace the default 1025/8025 host bindings declared in docker-compose.yml,
    # otherwise `include:` concatenates the lists and the container fights phase-1c for 1025.
    ports: !override
      - '127.0.0.1:1026:1025' # SMTP
      - '127.0.0.1:8026:8025' # Web UI + API
